# Cave of Echoes — an example xyzzy adventure.
#
# A small, fully-mapped world that exercises every optional section of the
# schema (rooms, items, characters, beats) so it doubles as a reference and a
# demo. A valid adventure needs only `meta`, `premise`, and `start` — those
# live here in `adventure.yaml`.
#
# Everything else (rooms, items, characters, beats) is optional structure the
# model will honor when present. It can be authored inline under `entities:`/
# `beats:` right here, or split by convention into sibling directories named
# after each kind (as this example does) — directory entries are appended
# after any inline ones of the same kind, so the two styles can mix:
#
#   rooms/         *.yaml files, each holding one or more Room entities
#   items/         *.yaml files, each holding one or more Item entities
#   characters/    *.yaml files, each holding one or more Character entities
#   beats/         *.yaml files, each holding one or more StoryBeat entries

meta:
  id: cave-of-echoes
  title: The Cave of Echoes
  author: xyzzy examples
  version: "1.0.0"

premise: >
  A cold draft breathes out of the hillside crack you have been searching for
  all week. Local stories say a colossal cavern lies beyond it, and that
  something old and patient guards a single perfect gemstone in its depths.
  You have a coil of rope, your wits, and — if you can find it — an old brass
  lantern left by the last person foolish enough to come this way. The tone is
  wry, unhurried, and a little eerie; the dark is never quite silent.

start:
  room: entrance
  inventory: []
  flags:
    lanternLit: false
  state:
    turnsInDark: 0
    treasureClaimed: false
    playerCanSee: false
